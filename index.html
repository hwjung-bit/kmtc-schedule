async function handleChangePw() {
  if (!state.pwNew || state.pwNew.length < 6) {
    showToast('비밀번호는 6자 이상이어야 합니다.');
    return;
  }
  if (state.pwNew !== state.pwConfirm) {
    showToast('두 비밀번호가 일치하지 않습니다.');
    return;
  }
  const hash = await hashPassword(state.pwNew);
  const { error } = await sb.from('users').update({
    password_hash: hash
  }).eq('email', state.user.email);
  if (error) {
    showToast('변경 실패: ' + error.message);
    return;
  }
  state.showPwForm = false;
  state.pwNew = '';
  state.pwConfirm = '';
  showToast('\u2713 비밀번호가 변경되었습니다.');
  render();
}

    state.favSearch = e.target.value; render();
  });
  searchBox.appendChild(inp);
  body.appendChild(searchBox);

  // Ship list
  const fq = (state.favSearch||'').trim().toUpperCase();
  const ships = state.ships.filter(s => {
    if (!fq) return true;
    return (s.code||'').toUpperCase().includes(fq)
      || (s.name||'').toUpperCase().includes(fq);
  });

  const list = h('div', {style:{
    background:'var(--card)',borderRadius:'14px',
    border:'1px solid var(--cardbr)',
    overflow:'hidden',
    boxShadow:'0 2px 8px rgba(20,40,80,.05)',
    marginBottom:'22px'
  }});

  ships.forEach(s => {
    list.appendChild(
      h('div', {style:{
        display:'flex',alignItems:'center',
        justifyContent:'space-between',
        padding:'11px 14px',
        borderBottom:'1px solid var(--divider)'
      }}, [
        h('div', {style:{minWidth:'0'}}, [
          h('div', {style:{display:'flex',
            alignItems:'baseline',gap:'7px'}}, [
            h('span', {style:{fontFamily:'Inter',
              fontWeight:'800',fontSize:'15px',
              color:'var(--ink)'}}, s.code),
            h('span', {style:{fontSize:'11.5px',
              color:'#8794a8'}}, s.name || '')
          ]),
          h('div', {style:{fontSize:'10.5px',
            color:'var(--muted)',marginTop:'2px',
            fontFamily:'Inter'}},
            'IMO ' + (s.imo||'-') + ' \xB7 '
            + (s.size_type||'-') + ' \xB7 '
            + numFmt(s.dwt) + ' DWT'),
          s.route_key ? h('div', {style:{
            fontSize:'10.5px',color:'#0064B4',
            marginTop:'2px'}}, s.route_key) : null
        ]),
        h('div', {style:{display:'flex',gap:'6px',
          flex:'0 0 auto',alignItems:'center'}}, [
          h('span', {style:{
            fontSize:'11px',fontWeight:'600',
            color:'#0064B4',background:'#e8f1fb',
            padding:'5px 9px',borderRadius:'8px',
            cursor:'pointer'
          }, onClick: () => {
            state.showShipForm = true;
            state.editShipCode = s.code;
            render();
          }}, '수정'),
          h('span', {style:{
            fontSize:'11px',fontWeight:'600',
            color:'#d14343',background:'#fdeaea',
            padding:'5px 9px',borderRadius:'8px',
            cursor:'pointer'
          }, onClick: async () => {
            const ok = await showConfirm(
              s.code + ' 선박을 삭제하시겠습니까?'
            );
            if (!ok) return;
            await sb.from('ships').delete()
              .eq('code', s.code);
            state.ships = state.ships.filter(
              x => x.code !== s.code
            );
            showToast(s.code + ' 삭제됨');
            render();
          }}, '삭제')
        ])
      ])
    );
  });
  body.appendChild(list);
}

function renderShipForm(body) {
  const editing = state.editShipCode;
  const ship = editing
    ? state.ships.find(s => s.code === editing) : {};

  const card = h('div', {style:{
    background:'var(--card)',borderRadius:'14px',
    border:'1px solid #cfe0f2',
    boxShadow:'0 2px 8px rgba(20,40,80,.05)',
    padding:'14px',marginBottom:'14px'
  }});

  card.appendChild(
    h('div', {style:{fontSize:'13px',fontWeight:'700',
      color:'var(--ink)',marginBottom:'12px'}},
      editing ? '선박 수정' : '선박 추가')
  );

  const grid = h('div', {style:{
    display:'grid',gridTemplateColumns:'1fr 1fr',
    gap:'8px'
  }});
  const fields = [
    ['sf_code', '코드 (KPS)', ship.code || ''],
    ['sf_name', '선박명', ship.name || ''],
    ['sf_imo', 'IMO No.', ship.imo || ''],
    ['sf_size', 'SIZE TYPE', ship.size_type || ''],
    ['sf_dwt', 'DWT', ship.dwt || ''],
    ['sf_gt', 'GT', ship.gt || ''],
    ['sf_built', '건조년', ship.built || ''],
    ['sf_flag', '기국', ship.flag || '']
  ];
  fields.forEach(([id, ph, val]) => {
    const inp = h('input', {
      id, placeholder: ph, value: val,
      style: {
        height:'40px',width:'100%',minWidth:'0',
        border:'1px solid #e0e6ee',borderRadius:'9px',
        padding:'0 12px',fontSize:'13px',outline:'none',
        background:'var(--card)',color:'var(--ink)'
      }
    });
    grid.appendChild(inp);
  });
  card.appendChild(grid);

  card.appendChild(
    h('div', {style:{marginTop:'8px',fontSize:'11px',
      color:'var(--muted)',padding:'2px'}},
      '\u203B 항로/기항지 정보는 API에서 자동 연동')
  );

  const btns = h('div', {style:{
    display:'flex',gap:'8px',marginTop:'12px'
  }});
  btns.appendChild(
    h('button', {style:{
      flex:'1',height:'40px',border:'none',
      borderRadius:'10px',background:'#0064B4',
      color:'#fff',fontWeight:'700',fontSize:'13px',
      cursor:'pointer'
    }, onClick: async () => {
      const code = ($('#sf_code')||{}).value || '';
      const name = ($('#sf_name')||{}).value || '';
      if (!code || !name) {
        showToast('코드와 선박명은 필수입니다.');
        return;
      }
      const rec = {
        code: code.toUpperCase(),
        name,
        imo: ($('#sf_imo')||{}).value || '',
        size_type: ($('#sf_size')||{}).value || '',
        dwt: parseInt(($('#sf_dwt')||{}).value)||0,
        gt: parseInt(($('#sf_gt')||{}).value)||0,
        built: parseInt(($('#sf_built')||{}).value)||0,
        flag: ($('#sf_flag')||{}).value || ''
      };
      if (editing) {
        await sb.from('ships').update(rec)
          .eq('code', editing);
        showToast(rec.code + ' 수정 완료');
      } else {
        await sb.from('ships').upsert(rec);
        showToast(rec.code + ' 추가 완료');
      }
      state.ships = await loadShips();
      state.showShipForm = false;
      state.editShipCode = null;
      render();
    }}, editing ? '수정 저장' : '추가')
  );
  btns.appendChild(
    h('button', {style:{
      flex:'0 0 auto',padding:'0 16px',height:'40px',
      border:'1px solid #e0e6ee',borderRadius:'10px',
      background:'var(--card)',color:'var(--ink3)',
      fontWeight:'600',fontSize:'13px',cursor:'pointer'
    }, onClick: () => {
      state.showShipForm = false;
      state.editShipCode = null;
      render();
    }}, '취소')
  );
  card.appendChild(btns);
  body.appendChild(card);
}

function renderSystemSettings(body) {
  body.appendChild(
    h('div', {className:'section-label'},
      '\u{1F4CA} 시스템 상태')
  );

  const card = h('div', {style:{
    background:'var(--card)',borderRadius:'14px',
    border:'1px solid var(--cardbr)',
    boxShadow:'0 2px 8px rgba(20,40,80,.05)',
    padding:'16px'
  }});

  // Refresh button
  card.appendChild(
    h('button', {style:{
      width:'100%',height:'46px',border:'none',
      borderRadius:'12px',
      background:'var(--gradient)',color:'#fff',
      fontWeight:'700',fontSize:'14px',
      cursor:'pointer',display:'flex',
      alignItems:'center',justifyContent:'center',
      gap:'8px'
    }, onClick: async () => {
      showToast('데이터 새로고침 중...');
      state.loading = true;
      render();
      state.ships = await loadShips();
      const favCodes = state.favorites.ship;
      if (favCodes.length) {
        const map = await loadScheduleFor(favCodes);
        Object.assign(state.schedules, map);
      }
      state.docks = await loadDocks();
      state.loading = false;
      state.lastUpdate = fmtFull(new Date());
      showToast('\u2713 최신 데이터로 업데이트 완료');
      render();
    }}, [
      h('span', {style:{fontSize:'16px'}}, '\u{1F504}'),
      '데이터 수동 새로고침'
    ])
  );

  // Stats
  const stats = h('div', {style:{
    marginTop:'16px',borderTop:'1px solid var(--divider)',
    paddingTop:'14px',display:'flex',
    flexDirection:'column',gap:'10px'
  }});
  const totalVoyages = Object.values(state.schedules)
    .reduce((s, rows) => {
      const voys = new Set(
        rows.map(r => r.voyage_no)
      );
      return s + voys.size;
    }, 0);

  const statRows = [
    ['마지막 업데이트', state.lastUpdate || '-'],
    ['등록 선박 / 총 항차',
      state.ships.length + '척 / '
      + totalVoyages + '항차'],
    ['도크 일정', state.docks.length + '건'],
    ['사용자', state.registeredUsers.length + '명'],
  ];
  statRows.forEach(([label, val]) => {
    stats.appendChild(
      h('div', {style:{display:'flex',
        alignItems:'center',
        justifyContent:'space-between'}}, [
        h('span', {style:{fontSize:'12px',
          color:'var(--ink3)'}}, label),
        h('span', {style:{fontFamily:'Inter',
          fontSize:'12px',color:'var(--ink)',
          fontWeight:'600'}}, val)
      ])
    );
  });
  card.appendChild(stats);
  body.appendChild(card);
}

/* ==================================================
   INITIALIZATION
================================================== */
async function initAppData() {
  state.loading = true;
  render();

  try {
    // Load ships first (fast)
    state.ships = await loadShips();
    console.log('initAppData: ships loaded:', state.ships.length);
    render();

    // Load favorites, docks, config in parallel
    const email = state.user ? state.user.email : null;
    const [favs, docks, config] = await Promise.all([
      loadFavorites(email),
      loadDocks(),
      loadConfig()
    ]);
    state.favorites = favs;
    state.docks = docks;
    if (config.last_update) {
      state.lastUpdate = config.last_update;
    } else {
      state.lastUpdate = fmtFull(new Date());
    }

    // Load ALL schedules at once (Supabase is fast)
    const allCodes = state.ships.map(s => s.code);
    if (allCodes.length) {
      const map = await loadScheduleFor(allCodes);
      Object.assign(state.schedules, map);
    }
    render();

    // Admin data
    if (state.user && state.user.role === 'admin') {
      const [pending, registered] = await Promise.all([
        loadPendingUsers(),
        loadRegisteredUsers()
      ]);
      state.pendingUsers = pending;
      state.registeredUsers = registered;
    }
  } catch (e) {
    console.error('Init error:', e);
    showToast('데이터 로드 중 오류 발생');
  }

  state.loading = false;
  render();
}

/* ===== BOOT ===== */
render();
if (state.loggedIn) {
  initAppData();
}
</script>
</body>
