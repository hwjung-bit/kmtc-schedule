<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport"
  content="width=device-width, initial-scale=1,
  maximum-scale=1, user-scalable=no,
  viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#023a76">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

<title>KMTC Schedule</title>

<!-- ===== Fonts ===== -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect"
  href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;900&display=swap"

<style>
/* ===== CSS Custom Properties (Light / Dark) ===== */
:root {
  --primary: #0064B4;
  --primary-dark: #004B8D;
  --gradient: linear-gradient(155deg,#0a4e96,#023a76);
  --page: #f8fafc;
  --card: #fff;
  --cardbr: #eef1f6;
  --ink: #10233f;
  --ink2: #33415c;
  --ink3: #6b7891;
  --muted: #97a2b5;
  --divider: #f1f4f8;
  --group-700: #00897b;
  --group-1800: #1e88e5;
  --group-2500: #3949ab;
  --group-4300: #6a3ab5;
  --group-5500: #8e24aa;
  --font: 'Noto Sans KR','Inter',sans-serif;
  --mono: 'Inter',monospace;
  --toast-bg: #023a76;
}
[data-theme="dark"] {
  --page: #0d1117;
  --card: #161b22;
  --cardbr: #30363d;
  --ink: #e6edf3;
  --ink2: #c9d1d9;
  --ink3: #8b949e;
  --muted: #6e7681;
  --divider: #21262d;
  --toast-bg: #1f6feb;
}
/* ===== Reset / Base ===== */
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;
  font-family:var(--font);
  background:var(--page);color:var(--ink);
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior:none;
}
input,button,textarea,select{font-family:inherit}
a{color:var(--primary);text-decoration:none}
a:hover{color:var(--primary-dark)}
::-webkit-scrollbar{width:0;height:0}
input[type=date]{color-scheme:light}
[data-theme="dark"] input[type=date]{color-scheme:dark}

/* ===== Animations ===== */
@keyframes kspin{to{transform:rotate(360deg)}}
.kspin{animation:kspin .7s linear infinite}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .25s ease}
@keyframes toastIn{from{opacity:0;transform:translateY(40px)}
  to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1;transform:translateY(0)}
  to{opacity:0;transform:translateY(40px)}}

/* ===== App Shell ===== */
#app{display:flex;flex-direction:column;
  height:100dvh;min-height:0;position:relative;
  max-width:480px;margin:0 auto;
  background:var(--page)}

/* ===== Tab Content ===== */
.tab-content{flex:1;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-y:contain}

/* ===== Sticky Header ===== */
.tab-header{background:var(--gradient);
  padding:14px 18px 16px;color:#fff;
  position:sticky;top:0;z-index:20}

/* ===== Bottom Tab Bar ===== */
.tab-bar{flex:0 0 auto;background:var(--card);
  border-top:1px solid var(--cardbr);
  box-shadow:0 -4px 20px rgba(20,40,80,.06);
  padding:8px 6px calc(6px + env(safe-area-inset-bottom));
  display:flex;z-index:30}
.tab-bar-item{flex:1;display:flex;flex-direction:column;
  align-items:center;gap:3px;padding:6px 0;cursor:pointer;
  transition:opacity .15s}
.tab-bar-item .icon{font-size:21px}
.tab-bar-item .label{font-size:10.5px;font-weight:500;
  color:var(--muted)}
.tab-bar-item.active .label{font-weight:700;
  color:var(--primary)}

/* ===== Ship Card ===== */
.ship-card{background:var(--card);border-radius:16px;
  box-shadow:0 2px 10px rgba(20,40,80,.06);
  border:1px solid var(--cardbr);overflow:hidden;
  margin-bottom:10px}
.ship-card-row{display:flex;align-items:stretch;
  cursor:pointer}
.ship-color-bar{width:6px;flex:0 0 6px}
.ship-card-body{flex:1;padding:10px 12px;min-width:0}
.ship-code{flex:0 0 auto;font-family:'Inter';
  font-weight:800;font-size:17px;color:var(--ink);
  letter-spacing:-.3px}
.ship-route{display:flex;align-items:baseline;gap:5px;
  font-family:'Inter';font-weight:800;font-size:13px;
  color:var(--ink);white-space:nowrap;cursor:help}
.ship-eta-short{flex:0 0 auto;font-family:'Inter';
  font-size:10px;color:var(--muted)}
.ship-status{flex:0 0 auto;display:flex;
  align-items:center;gap:3px;font-size:10.5px;
  font-weight:700;padding:3px 8px;border-radius:16px}
.ship-star{flex:0 0 auto;font-size:16px;cursor:pointer;
  user-select:none}

/* ===== Expand Panel ===== */
.ship-expand{border-top:1px dashed var(--cardbr);
  background:var(--page);padding:14px}
.spec-grid{display:grid;grid-template-columns:1fr 1fr 1fr;
  gap:8px;margin-bottom:14px}
.spec-item{background:var(--card);
  border:1px solid var(--cardbr);border-radius:9px;
  padding:8px 10px}
.spec-label{font-size:9.5px;color:var(--muted)}
.spec-val{font-size:12px;font-weight:700;
  color:var(--ink);font-family:'Inter'}

/* ===== Voyage Tabs ===== */
.voy-tabs{display:flex;gap:6px;margin-bottom:12px}
.voy-tab{flex:1;text-align:center;font-size:12px;
  font-weight:700;padding:8px 0;border-radius:9px;
  cursor:pointer;border:1px solid var(--cardbr);
  background:var(--card);color:var(--primary);
  transition:all .15s}
.voy-tab.active{background:var(--primary);color:#fff;
  border-color:var(--primary)}

/* ===== Port Call List ===== */
.port-call{display:flex;align-items:center;gap:12px;
  padding-bottom:13px}
.port-dot{width:11px;height:11px;border-radius:50%;
  box-sizing:border-box;flex:0 0 auto}
.port-info{flex:1;display:flex;align-items:center;
  justify-content:space-between;gap:10px}
.port-name{font-size:13px;color:var(--ink2)}
.port-times{display:flex;gap:14px;flex:0 0 auto}
.port-time{width:82px;text-align:right;
  font-family:'Inter';font-size:11px;color:var(--ink3)}

/* ===== Toast ===== */
.toast{position:fixed;bottom:80px;left:50%;
  transform:translateX(-50%);z-index:100;
  background:var(--toast-bg);color:#fff;
  padding:10px 20px;border-radius:24px;
  font-size:13px;font-weight:600;
  box-shadow:0 6px 24px rgba(0,0,0,.25);
  pointer-events:none;white-space:nowrap;
  animation:toastIn .3s ease}
.toast.out{animation:toastOut .3s ease forwards}

/* ===== Confirm Overlay ===== */
.overlay{position:fixed;inset:0;
  background:rgba(10,20,40,.45);
  display:flex;align-items:center;
  justify-content:center;z-index:60;padding:30px}
.confirm-box{background:var(--card);border-radius:18px;
  padding:24px 22px 20px;width:100%;max-width:306px;
  box-shadow:0 20px 50px rgba(10,20,40,.4)}

/* ===== Login Screen ===== */
.login-bg{flex:1;overflow-y:auto;display:flex;
  flex-direction:column;padding:0 30px;
  background:linear-gradient(165deg,#0a4e96 0%,
  #023a76 45%,#001b3f 100%)}
.login-center{flex:1;display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  min-height:600px}
.login-icon{width:76px;height:76px;border-radius:20px;
  background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.18);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:22px}
.login-title{font-family:'Inter';font-weight:800;
  font-size:38px;letter-spacing:1px;color:#fff;
  line-height:1}
.login-sub{margin-top:10px;font-size:12px;
  letter-spacing:5px;color:#8fb6e6;
  font-family:'Inter';font-weight:600}
.login-desc{margin-top:6px;font-size:12px;
  color:#b9cee8}
.login-input{height:52px;border-radius:14px;
  border:1px solid rgba(255,255,255,.22);
  background:rgba(255,255,255,.10);padding:0 18px;
  font-size:15px;color:#fff;outline:none;width:100%}
.login-input::placeholder{color:rgba(255,255,255,.5)}
.login-btn{height:52px;margin-top:6px;border:none;
  border-radius:14px;background:#fff;color:#023a76;
  font-weight:700;font-size:16px;cursor:pointer;
  width:100%;font-family:var(--font)}
.login-error{font-size:13px;color:#ffd166;
  padding:2px 4px}
.pending-box{display:flex;align-items:center;gap:8px;
  background:rgba(255,209,102,.12);
  border:1px solid rgba(255,209,102,.35);
  border-radius:12px;padding:12px 14px;font-size:13px;
  color:#ffe1a0}

/* ===== Chip / Badge ===== */
.chip{display:inline-flex;align-items:center;
  font-size:12.5px;font-weight:600;padding:6px 13px;
  border-radius:20px;cursor:pointer;
  flex:0 0 auto;white-space:nowrap}
.route-badge{font-size:11.5px;font-weight:700;
  color:var(--primary);background:#e8f1fb;
  padding:3px 9px;border-radius:8px}
.change-banner{margin-top:8px;display:flex;
  align-items:center;gap:6px;background:#fff3e0;
  border:1px solid #ffd9a8;border-radius:9px;
  padding:6px 9px}
.change-banner span:last-child{font-size:11px;
  font-weight:700;color:#c25d00;line-height:1.35}

/* ===== Loading Spinner (overlay) ===== */
.sync-spinner{position:absolute;top:12px;
  left:0;right:0;display:flex;justify-content:center;
  z-index:30}
.sync-pill{display:flex;align-items:center;gap:8px;
  background:#023a76;color:#fff;padding:8px 16px;
  border-radius:20px;font-size:12.5px;font-weight:600;
  box-shadow:0 6px 18px rgba(2,58,118,.35)}
.sync-ring{display:inline-block;width:13px;height:13px;
  border:2px solid rgba(255,255,255,.4);
  border-top-color:#fff;border-radius:50%}

/* ===== Settings Card ===== */
.settings-card{background:var(--card);border-radius:16px;
  border:1px solid var(--cardbr);
  box-shadow:0 2px 8px rgba(20,40,80,.05);
  padding:16px;margin-bottom:20px}
.avatar{width:46px;height:46px;border-radius:50%;
  background:var(--primary);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:18px;font-family:'Inter'}
.dark-toggle{display:inline-flex;align-items:center;
  width:50px;height:28px;border-radius:16px;padding:3px;
  cursor:pointer;transition:background .2s}
.dark-knob{width:22px;height:22px;border-radius:50%;
  background:var(--card);
  box-shadow:0 1px 3px rgba(0,0,0,.3);
  transition:transform .2s}
.logout-btn{width:100%;height:42px;margin-top:12px;
  border:1px solid #f0d4d4;border-radius:11px;
  background:#fff5f5;color:#d14343;font-weight:700;
  font-size:14px;cursor:pointer;font-family:var(--font)}

/* ===== Dock Card ===== */
.dock-card{background:var(--card);border-radius:14px;
  box-shadow:0 2px 8px rgba(20,40,80,.05);
  border:1px solid var(--cardbr);padding:11px 14px;
  display:flex;align-items:center;
  justify-content:space-between;gap:10px;
  margin-bottom:10px}
.dock-card.current{border-color:#ffe0bd;
  box-shadow:0 2px 10px rgba(238,124,26,.12)}

/* ===== Utility ===== */
.section-label{font-size:12px;font-weight:700;
  color:var(--muted);padding:0 2px 10px}
.empty-box{background:var(--card);border-radius:14px;
  border:1px dashed var(--cardbr);padding:26px 18px;
  text-align:center}
.search-box{display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.14);
  border:1px solid rgba(255,255,255,.2);
  border-radius:11px;padding:0 12px;height:42px}
.search-box input{flex:1;border:none;
  background:transparent;outline:none;color:#fff;
  font-size:13.5px;font-family:var(--font)}
.search-box input::placeholder{
  color:rgba(255,255,255,.5)}
.search-box-light{background:var(--card);
  border:1px solid var(--cardbr)}
.search-box-light input{color:var(--ink)}
.search-box-light input::placeholder{
  color:var(--muted)}
.clear-x{cursor:pointer;opacity:.85;font-size:15px;
  color:#fff;user-select:none}
.group-header{display:flex;align-items:center;
  justify-content:space-between;padding:10px 0;
  cursor:pointer}
.hidden{display:none!important}
</style>
</head>

  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'style' && typeof v === 'object') {
      Object.assign(el.style, v);

  const data = new TextEncoder().encode(pw);
  const buf = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(buf))
    .map(b => b.toString(16).padStart(2, '0')).join('');
}

function portShort(name) {
  if (!name) return '';
  const raw = name.split(',')[0].trim();
  const up = raw.toUpperCase();
  // Check consolidation map
  if (PORT_CONSOLIDATE[up]) return PORT_CONSOLIDATE[up];
  // Partial match for BUSAN variants
  if (up.includes('PUSAN') || up.includes('BUSAN')) return 'BUSAN';
  if (up.includes('KWANGYANG') || up.includes('GWANGYANG')) return 'GWANGYANG';
  if (up.includes('ULSAN')) return 'ULSAN';
  if (up.includes('INCHEON')) return 'INCHEON';
  return raw;
}
function numFmt(n) {
  return (n||0).toLocaleString();
}

const GROUP_COLORS = {
  '700~1000 TEU': '#00897b',
  '700~1000': '#00897b',
  '1800 TEU': '#1e88e5',
  '1800': '#1e88e5',
  '2500~2800 TEU': '#3949ab',

  '5500~6500 TEU': '#8e24aa',
  '5500~6500': '#8e24aa'
};
function groupColor(ship) {
  const g = ship.ship_group || ship.size_type || '';
  for (const [k, v] of Object.entries(GROUP_COLORS)) {
    if (g.includes(k) ||
        g.replace(/\s*TEU/i,'').includes(k)) return v;
  }
  // Fallback based on size_type text
  const st = (ship.size_type || '').toUpperCase();
  if (/700|1000/.test(st)) return '#00897b';
  if (/1800|BKKMAX/.test(st)) return '#1e88e5';
  if (/2500|2800/.test(st)) return '#3949ab';
  if (/4300/.test(st)) return '#6a3ab5';
  return '#8e24aa';
}
function groupKey(ship) {
  const st = (ship.size_type || '').toUpperCase();
  if (/700|1000/.test(st)) return '700~1000 TEU';
  if (/1800|BKKMAX/.test(st)) return '1800 TEU';
  if (/2500|2800/.test(st)) return '2500~2800 TEU';
  if (/4300/.test(st)) return '4300 TEU';
  return '5500~6500 TEU';
}

async function loadScheduleFor(codes) {
  if (!codes.length) return {};
  const map = {};
  // Load per vessel to avoid 1000-row limit
  // Batch 3 at a time for speed
  for (let i = 0; i < codes.length; i += 3) {
    const batch = codes.slice(i, i + 3);
    const promises = batch.map(async (code) => {
      const { data, error } = await sb
        .from('schedules').select('*')
        .eq('vessel_code', code)
        .order('eta', { ascending: true })
        .limit(1000);
      if (error) {
        console.error('schedule load error ' + code, error);
        return;
      }
      if (data && data.length) map[code] = data;
    });
    await Promise.all(promises);
  }
  const total = Object.values(map).reduce(
    (s, r) => s + r.length, 0);
  console.log('loadScheduleFor: loaded',
    total, 'rows for', Object.keys(map).length, 'vessels');
  return map;
}

async function loadDocks() {
  // 1. Load from docks table (admin-entered)
  const { data: manualDocks } = await sb
    .from('docks').select('*')
    .order('start_date');

  // 2. Load from schedules where direction='D' (API dock voyages)
  const { data: dockSchedules } = await sb
    .from('schedules').select('*')
    .eq('direction', 'D')
    .order('eta', { ascending: true });

  // Convert D-direction schedules to dock format
  // Group by vessel_code + voyage_no
  const voyMap = {};
  (dockSchedules || []).forEach(r => {
    const key = r.vessel_code + ':' + r.voyage_no;
    if (!voyMap[key]) voyMap[key] = [];
    voyMap[key].push(r);
  });

  const apiDocks = Object.entries(voyMap).map(
    ([key, calls]) => {
      const [code, voyNo] = key.split(':');
      const sorted = calls.sort(
        (a, b) => new Date(a.eta) - new Date(b.eta)
      );
      const first = sorted[0];
      const last = sorted[sorted.length - 1];
      // Find ship name
      const ship = state.ships.find(
        s => s.code === code
      );
      return {
        id: 'api_' + key,
        code: code,
        name: ship ? ship.name : code,
        start_date: first.eta,
        end_date: last.etd || last.eta,
        yard: portShort(last.port_name) || '',
        port: portShort(first.port_name) || '',
        voyage_no: voyNo,
        from_api: true
      };
    }
  );

  // Merge manual + API docks, dedupe by code+date
  const all = [...(manualDocks || []), ...apiDocks];
  all.sort((a, b) =>
    new Date(a.start_date) - new Date(b.start_date)
  );
  return all;
}

async function doLogin(email, password) {
  email = (email || '').trim().toLowerCase();
  if (!email) return { error: '이메일을 입력해 주세요.' };
  if (!password) return { error: '비밀번호를 입력해 주세요.' };

  const hash = await hashPassword(password);
  const { data: user, error } = await sb
    .from('users').select('*')
    .eq('email', email).single();

  if (error || !user) {
    return { error: '등록되지 않은 계정입니다.' };
  }
  if (user.status === 'pending') {
    return { error: '관리자 승인 대기 중입니다.',
      pending: true };
  }
  if (user.status === 'rejected') {
    return { error: '접근이 거부된 계정입니다.' };
  }
  if (user.password_hash !== hash) {
    return { error: '비밀번호가 일치하지 않습니다.' };
  }
  return { user };
}

async function doRegister(info) {
  const { email, name, password, dept, purpose } = info;
  if (!email || !name) {
    return { error: '이메일과 이름은 필수입니다.' };
  }
  if (!password || password.length < 6) {
    return {
      error: '비밀번호는 6자 이상이어야 합니다.'
    };
  }
  const hash = await hashPassword(password);
  const { error } = await sb.from('users').insert({
    email: email.toLowerCase().trim(),
    name, dept: dept || '',
    password_hash: hash,
    role: 'user',
    status: 'pending',
    purpose: purpose || ''
  });
  if (error) {
    if (error.code === '23505') {
      return { error: '이미 등록된 이메일입니다.' };
    }
    return { error: '등록 중 오류: ' + error.message };
  }
  return { ok: true };
}

/* ==================================================
   SCHEDULE PROCESSING
================================================== */
function processSchedule(rows) {
  if (!rows || !rows.length) {
    return { voyages: [], current: null, next: null };
  }
  // Group by voyage_no
  const voyMap = {};
  rows.forEach(r => {
    const v = r.voyage_no || 'UNKNOWN';
    (voyMap[v] = voyMap[v] || []).push(r);
  });
  // Sort voyages by earliest ETA
  const voyages = Object.entries(voyMap)
    .map(([vno, calls]) => {
      calls.sort((a, b) =>
        new Date(a.eta) - new Date(b.eta)
      );
      const firstEta = parseDate(calls[0].eta);
      const lastEtd = parseDate(
        calls[calls.length - 1].etd
      );
      return { voyage_no: vno, calls, firstEta, lastEtd };
    })
    .sort((a, b) => a.firstEta - b.firstEta);

  // Find current voyage — closest to today
  const now = new Date();
  let curIdx = -1;

  // First: find voyage where firstEta <= now <= lastEtd (both must be valid dates)
  for (let i = 0; i < voyages.length; i++) {
    const v = voyages[i];
    if (v.firstEta && v.lastEtd &&
        !isNaN(v.firstEta) && !isNaN(v.lastEtd) &&
        v.firstEta <= now && v.lastEtd >= now) {
      curIdx = i; break;
    }
  }

  // If not found: find the latest voyage that started before now
  if (curIdx < 0) {
    for (let i = voyages.length - 1; i >= 0; i--) {
      if (voyages[i].firstEta && !isNaN(voyages[i].firstEta)
          && voyages[i].firstEta <= now) {
        curIdx = i; break;
      }
    }
  }

  // If still not found: find first future voyage
  if (curIdx < 0) {
    curIdx = voyages.findIndex(
      v => v.firstEta && !isNaN(v.firstEta) && v.firstEta > now
    );
    if (curIdx < 0) curIdx = voyages.length - 1;
  }
  const current = voyages[curIdx] || null;
  const next = voyages[curIdx + 1] || null;

  return { voyages, current, next };
}

/**
 * Determine ship status & current position from ALL raw schedule data.
 * Looks across all voyages, not just "current" voyage.
 */
function getShipPosition(rawRows) {
  if (!rawRows || !rawRows.length) {
    return {
      status: { label: '정보없음', color: '#97a2b5',
        bg: '#eef1f6', icon: '—' },
      from: '', to: '', eta: null, voyage: ''
    };
  }

  // Sort all calls by ETA chronologically
  const sorted = [...rawRows]
    .filter(r => r.eta)
    .sort((a, b) => new Date(a.eta) - new Date(b.eta));

  if (!sorted.length) {
    return {
      status: { label: '정보없음', color: '#97a2b5',
        bg: '#eef1f6', icon: '—' },
      from: '', to: '', eta: null, voyage: ''
    };
  }

  // Find: last port where ship departed (departure_status='A')
  let lastDeparted = null;
  let lastDepartedIdx = -1;
  // Find: port where ship is berthed (arrival='A', departure!='A')
  let berthedAt = null;

  for (let i = sorted.length - 1; i >= 0; i--) {
    const c = sorted[i];
    if (!berthedAt && c.arrival_status === 'A'
        && c.departure_status !== 'A') {
      berthedAt = c;
    }
    if (!lastDeparted && c.departure_status === 'A') {
      lastDeparted = c;
      lastDepartedIdx = i;
      break; // found the latest confirmed departure
    }
  }

  // If berthed somewhere
  if (berthedAt) {
    const bEta = parseDate(berthedAt.eta);
    // Berthed: find next port after this
    const bIdx = sorted.indexOf(berthedAt);
    const nextPort = sorted[bIdx + 1];
    return {
      status: { label: '접안중', color: '#0064B4',
        bg: '#e8f1fb', icon: '⚓' },
      from: portShort(berthedAt.port_name),
      to: nextPort ? portShort(nextPort.port_name) : '',
      eta: bEta,
      voyage: berthedAt.voyage_no || ''
    };
  }

  // If sailing: last departed → next port
  if (lastDeparted && lastDepartedIdx >= 0) {
    const nextCall = sorted[lastDepartedIdx + 1];
    if (nextCall) {
      return {
        status: { label: '운항중', color: '#1b7a3d',
          bg: '#e6f4ea', icon: '▶' },
        from: portShort(lastDeparted.port_name),
        to: portShort(nextCall.port_name),
        eta: parseDate(nextCall.eta),
        voyage: nextCall.voyage_no || ''
      };
    }
  }

  // Fallback: find first future port
  const now = new Date();
  const nextFuture = sorted.find(
    c => parseDate(c.eta) > now
  );
  if (nextFuture) {
    const nIdx = sorted.indexOf(nextFuture);
    const prevPort = nIdx > 0 ? sorted[nIdx - 1] : null;
    return {
      status: { label: '운항중', color: '#1b7a3d',
        bg: '#e6f4ea', icon: '▶' },
      from: prevPort ? portShort(prevPort.port_name) : '',
      to: portShort(nextFuture.port_name),
      eta: parseDate(nextFuture.eta),
      voyage: nextFuture.voyage_no || ''
    };
  }

  // All in past
  const last = sorted[sorted.length - 1];
  return {
    status: { label: '정보없음', color: '#97a2b5',
      bg: '#eef1f6', icon: '—' },
    from: portShort(last.port_name),
    to: '',
    eta: null,
    voyage: last.voyage_no || ''
  };
}

/* ==================================================
   RENDER FUNCTIONS
================================================== */
function render() {
  try {
    const app = document.getElementById('app');
    if (!app) return;

    // Save scroll + focus
    const tc = document.getElementById('tab-content');
    const scrollY = tc ? tc.scrollTop : 0;
    const focused = document.activeElement;
    const focusId = focused ? focused.id : null;
    const focusTag = focused ? focused.tagName : null;
    const selStart = focused && focused.selectionStart != null
      ? focused.selectionStart : null;

    app.innerHTML = '';
    if (!state.loggedIn) {
      renderLogin(app);
    } else {
      renderApp(app);
    }

    // Restore scroll
    const tc2 = document.getElementById('tab-content');
    if (tc2 && scrollY > 0) tc2.scrollTop = scrollY;

    // Schedule body needs to be populated AFTER DOM is ready
    if (state.loggedIn && state.activeTab === 'schedule') {
      renderScheduleBody();
    }

    // Restore focus
    if (focusId) {
      const el = document.getElementById(focusId);
      if (el) {
        el.focus();
        if (selStart != null && el.setSelectionRange) {
          try { el.setSelectionRange(selStart, selStart); }
          catch(e) {}
        }
      }
    } else if (focusTag === 'INPUT' || focusTag === 'TEXTAREA') {
      // Try to find by matching tag and value
      const inputs = app.querySelectorAll('input,textarea');
      for (const inp of inputs) {
        if (inp.value === focused.value) {
          inp.focus();
          if (selStart != null && inp.setSelectionRange) {
            try { inp.setSelectionRange(selStart, selStart); }
            catch(e) {}
          }
          break;
        }
      }
    }
  } catch(e) {
    console.error('Render error:', e);
  }
}

async function handleLogin() {
  const res = await doLogin(
    state.loginEmail, state.loginPassword
  );
  if (res.error) {
    state.loginError = res.error;
    render();
    return;
  }
  state.user = res.user;
  state.loggedIn = true;
  state.loginError = '';
  try {
    localStorage.setItem(
      'kmtc_session', JSON.stringify(res.user)
    );
  } catch(e) {}
  render();
  await initAppData();
}

async function handleRegister() {
  // Password match check
  if (state.regPassword !== state.regPasswordConfirm) {
    state.loginError = '비밀번호가 일치하지 않습니다.';
    render();
    return;
  }
  const res = await doRegister({
    email: state.reqEmail,
    name: state.reqName,
    password: state.regPassword,
    dept: state.reqDept,
    purpose: state.regPurpose
  });
  if (res.error) {
    state.regError = res.error;
    render();
    return;
  }
  state.loginForm = 'login';
  state.loginError = '';
  showToast('계정 신청이 완료되었습니다. 관리자 승인을 기다려주세요.');
  render();
}

async function handleForgot() {
  const em = (state.forgotEmail||'').trim().toLowerCase();
  if (!em || !em.includes('@')) {
    state.forgotErr = '올바른 이메일을 입력해주세요.';
    state.forgotMsg = '';
    render();
    return;
  }
  // In real app, would call an edge function
  state.forgotErr = '';
  state.forgotMsg =
    em + '로 임시 비밀번호를 발송했습니다. '
    + '로그인 후 설정에서 변경하세요.';
  render();
}

function handleLogout() {
  state.loggedIn = false;
  state.user = null;
  state.ships = [];
  state.schedules = {};
  state.favorites = { ship: [], port: [] };
  try {
    localStorage.removeItem('kmtc_session');
  } catch(e) {}
  render();
}

/* ===== MAIN APP ===== */
function renderApp(app) {
  const main = h('div', {
    id: 'app-main',
    style: {
      display: 'flex', flexDirection: 'column',
      height: '100%', minHeight: '0',
      position: 'relative'
    }
  });

  // Loading indicator
  if (state.loading) {
    main.appendChild(
      h('div', {className: 'sync-spinner'},
        h('div', {className: 'sync-pill'}, [
          h('span', {
            className: 'sync-ring kspin'
          }),
          '동기화 중\u2026'
        ])
      )
    );
  }

  // Tab content
  const content = h('div', {
    className: 'tab-content',
    id: 'tab-content'
  });

  switch (state.activeTab) {
    case 'schedule': renderScheduleTab(content); break;
    case 'dock': renderDockTab(content); break;
    case 'port': renderPortTab(content); break;
    case 'settings': renderSettingsTab(content); break;
  }
  main.appendChild(content);

  // Bottom tab bar
  const bar = h('div', {className: 'tab-bar'});
  const tabs = [
    { id:'schedule', icon:'\u{1F6A2}', label:'스케줄' },
    { id:'dock', icon:'\u{1F527}', label:'입거' },
    { id:'port', icon:'\u{1F50D}', label:'항구' },
    { id:'settings', icon:'\u2699\uFE0F', label:'설정' }
  ];
  tabs.forEach(t => {
    const active = state.activeTab === t.id;
    const item = h('div', {
      className:
        'tab-bar-item' + (active ? ' active' : ''),
      onClick: () => {
        state.activeTab = t.id;
        render();
      }
    }, [
      h('span', {className:'icon',
        style:{
          opacity: active ? '1' : '0.5',
          filter: active ? 'none' : 'grayscale(0.5)'
        }
      }, t.icon),
      h('span', {className:'label'}, t.label)
    ]);
    bar.appendChild(item);
  });
  main.appendChild(bar);
  app.appendChild(main);
}

function renderScheduleBody() {
  const body = document.getElementById('schedule-body');
  if (!body) return;
  body.innerHTML = '';

  // If ships not loaded yet, show loading message
  if (!state.ships.length) {
    body.appendChild(
      h('div', {style:{
        padding:'40px 20px',textAlign:'center',
        color:'var(--muted)',fontSize:'13px'
      }}, '선박 목록 로딩 중...')
    );
    return;
  }

  const q = (state.schedQuery || '').trim().toUpperCase();
  const isFiltering = !!(q || state.dateFrom
    || state.dateTo);

  if (isFiltering) {
    // Filtered search results
    let results = state.ships.filter(ship => {
      if (q) {
        const code = (ship.code || '').toUpperCase();
        const name = (ship.name || '').toUpperCase();
        if (!code.includes(q) && !name.includes(q)) {
          return false;
        }
      }
      return true;
    });

    // TODO: date range filtering on schedule data
    // For now, filter ships that have schedules in range
    if (state.dateFrom || state.dateTo) {
      const fromT = state.dateFrom
        ? new Date(state.dateFrom + 'T00:00:00') : null;
      const toT = state.dateTo
        ? new Date(state.dateTo + 'T23:59:59') : null;
      results = results.filter(ship => {
        const rows = state.schedules[ship.code];
        if (!rows) return false;
        return rows.some(r => {
          const eta = parseDate(r.eta);
          if (!eta) return false;
          if (fromT && eta < fromT) return false;
          if (toT && eta > toT) return false;
          return true;
        });
      });
    }

    body.appendChild(
      h('div', {className: 'section-label'},
        `검색 결과 ${results.length}척`
        + (state.dateFrom || state.dateTo
          ? ` \xB7 ${state.dateFrom||'\u2026'}`
            + ` ~ ${state.dateTo||'\u2026'}`
          : ''))
    );

    if (!results.length) {
      body.appendChild(
        h('div', {style:{
          background:'var(--card)',borderRadius:'14px',
          border:'1px solid var(--cardbr)',
          padding:'22px',textAlign:'center',
          fontSize:'13px',color:'var(--muted)'
        }}, '해당 조건의 선박이 없습니다.')
      );
    } else {
      results.forEach(ship => {
        body.appendChild(renderShipCard(ship));
      });
    }
  } else {
    // Default: favorites
    body.appendChild(
      h('div', {className: 'section-label'},
        '\u2B50 내 즐겨찾기 선박')
    );

    const favCodes = state.favorites.ship;
    const favShips = favCodes
      .map(c => state.ships.find(s => s.code === c))
      .filter(Boolean);

    if (favShips.length) {
      favShips.forEach(ship => {
        body.appendChild(renderShipCard(ship));
      });
    } else {
      body.appendChild(
        h('div', {style:{
          background:'var(--card)',borderRadius:'14px',
          border:'1px dashed var(--cardbr)',
          padding:'26px 18px',textAlign:'center'
        }}, [
          h('div', {style:{fontSize:'30px',marginBottom:'8px'}}, '\u2B50'),
          h('div', {style:{
            fontSize:'13px',color:'var(--muted)',lineHeight:'1.5'
          }}, '즐겨찾기한 선박이 없습니다.\n검색 또는 아래 목록에서 ☆를 눌러 추가하세요.')
        ])
      );
    }

    // KMTC / SUNNY fleet tabs
    const favSet = new Set(favCodes);
    // fleetTab can be 'KMTC', 'SUNNY', or null (collapsed)

    const tabRow = h('div', {style:{
      display:'flex',gap:'8px',marginTop:'18px',marginBottom:'12px'
    }});
    ['KMTC','SUNNY'].forEach(tab => {
      const active = state.fleetTab === tab;
      tabRow.appendChild(
        h('div', {
          style:{
            flex:'1',textAlign:'center',fontSize:'13px',
            fontWeight:'700',padding:'9px 0',
            borderRadius:'10px',cursor:'pointer',
            color: active ? '#fff' : 'var(--ink2)',
            background: active ? 'var(--primary)' : 'var(--card)',
            border: '1px solid ' + (active ? 'var(--primary)' : 'var(--cardbr)')
          },
          onClick: () => {
            // Toggle: same tab → collapse, different → switch
            if (state.fleetTab === tab) {
              state.fleetTab = null; // collapse
            } else {
              state.fleetTab = tab;
            }
            renderScheduleBody();
          }
        }, tab)
      );
    });
    body.appendChild(tabRow);

    // Fleet ships (only show when a tab is selected)
    if (state.fleetTab) {
      const isKmtc = s => s.code && s.code.startsWith('K');
      const isSunny = s => s.code && !s.code.startsWith('K');
      const fleetShips = state.ships
        .filter(s => state.fleetTab === 'KMTC' ? isKmtc(s) : isSunny(s))
        .filter(s => !favSet.has(s.code));

      if (fleetShips.length) {
        fleetShips.forEach(ship => {
          body.appendChild(renderShipCard(ship));
        });
      }
    }
  }
}

/* ===== SHIP CARD ===== */
function renderShipCard(ship) {
  const code = ship.code;
  const color = groupColor(ship);
  const isFav = state.favorites.ship.includes(code);
  const rows = state.schedules[code];
  const schedule = processSchedule(rows);
  // Use raw rows for accurate position detection
  const pos = getShipPosition(rows || []);
  const status = pos.status;
  const portInfo = pos;

  const card = h('div', {className: 'ship-card'});

  // Collapsed row
  const row = h('div', {
    className: 'ship-card-row',
    onClick: async () => {
      if (state.expanded === code) {
        state.expanded = null;
      } else {
        state.expanded = code;
        if (!state.schedules[code]) {
          const map = await loadScheduleFor([code]);
          Object.assign(state.schedules, map);
        }
      }
      renderScheduleBody();
    }
  });

  // Color bar
  row.appendChild(
    h('div', {className: 'ship-color-bar',
      style: { background: color }})
  );

  // Body
  const body = h('div', {className: 'ship-card-body'});
  const topRow = h('div', {style:{
    display:'flex',alignItems:'center',gap:'9px'
  }});
  topRow.appendChild(
    h('span', {className: 'ship-code'}, code)
  );

  // Route info
  const routeDiv = h('div', {style:{
    flex:'1',minWidth:'0',display:'flex',
    alignItems:'baseline',gap:'6px'
  }});
  if (portInfo.from && portInfo.to) {
    const routeSpan = h('span', {
      className: 'ship-route',
      title: portInfo.from + ' \u2192 ' + portInfo.to
    }, [
      portInfo.from.slice(0, 3),
      h('span', {style:{color: color}}, '\u2192'),
      portInfo.to.slice(0, 3)
    ]);
    routeDiv.appendChild(routeSpan);
    if (portInfo.eta) {
      routeDiv.appendChild(
        h('span', {className: 'ship-eta-short'},
          fmtDateOnly(portInfo.eta))
      );
    }
  } else {
    routeDiv.appendChild(
      h('span', {style:{fontSize:'12px',
        color:'var(--muted)'}},
        ship.name || '')
    );
  }
  topRow.appendChild(routeDiv);

  // Status badge
  topRow.appendChild(
    h('span', {className: 'ship-status',
      style: {
        color: status.color,
        background: status.bg
      }
    }, [
      h('span', {style:{fontSize:'8px'}}, status.icon),
      status.label
    ])
  );

  // Star
  topRow.appendChild(
    h('span', {
      className: 'ship-star',
      style: { color: isFav ? '#f6a623' : '#c3ccda' },
      onClick: async (e) => {
        e.stopPropagation();
        await toggleShipFav(code);
      }
    }, isFav ? '\u2605' : '\u2606')
  );

  body.appendChild(topRow);
  row.appendChild(body);
  card.appendChild(row);

  // Expanded panel
  if (state.expanded === code) {
    card.appendChild(
      renderShipExpand(ship, schedule, color)
    );
  }

  return card;
}

function renderShipExpand(ship, schedule, color) {
  const code = ship.code;
  const panel = h('div', {className: 'ship-expand'});

  // Spec toggle
  const showSpec = state.showSpec[code];
  const specHeader = h('div', {style:{
    display:'flex',alignItems:'center',
    justifyContent:'space-between',cursor:'pointer',
    marginBottom:'12px'
  }, onClick: () => {
    state.showSpec[code] = !state.showSpec[code];
    render();
  }});
  specHeader.appendChild(
    h('span', {style:{fontSize:'11px',fontWeight:'700',
      color:'#7d8aa0',letterSpacing:'0.3px'}},
      '선박 상세 정보')
  );
  specHeader.appendChild(
    h('span', {style:{fontSize:'11px',
      color:'#9aa5b6'}},
      showSpec ? '\u25B2' : '\u25BE')
  );
  panel.appendChild(specHeader);

  if (showSpec) {
    const grid = h('div', {className: 'spec-grid'});
    const specs = [
      ['IMO No.', ship.imo || '-'],
      ['SIZE TYPE', ship.size_type || '-'],
      ['건조년', ship.built || '-'],
      ['DWT', numFmt(ship.dwt)],
      ['GT', numFmt(ship.gt)],
      ['기국', ship.flag || '-']
    ];
    specs.forEach(([lbl, val]) => {
      grid.appendChild(
        h('div', {className: 'spec-item'}, [
          h('div', {className: 'spec-label'}, lbl),
          h('div', {className: 'spec-val'}, String(val))
        ])
      );
    });
    panel.appendChild(grid);
  }

  // Route badge
  if (ship.route_key) {
    panel.appendChild(
      h('div', {style:{
        display:'flex',alignItems:'center',gap:'6px',
        marginBottom:'12px'
      }}, [
        h('span', {style:{fontSize:'11px',
          color:'var(--ink3)'}}, '투입 항로'),
        h('span', {className: 'route-badge'},
          ship.route_key)
      ])
    );
  }

  // Voyage tabs — current + all future voyages
  const voyTab = state.voyTab[code] || 'cur';
  const now = new Date();

  // Get current + future voyages
  const curVoyNo = schedule.current
    ? schedule.current.voyage_no : null;
  const futureVoyages = schedule.voyages.filter(v =>
    (v.lastEtd && !isNaN(v.lastEtd) && v.lastEtd >= now)
    || v.voyage_no === curVoyNo  // always include current
  );
  // Dedupe and sort
  const seen = new Set();
  const showVoyages = futureVoyages
    .filter(v => {
      if (seen.has(v.voyage_no)) return false;
      seen.add(v.voyage_no); return true;
    })
    .sort((a, b) => a.firstEta - b.firstEta);
  // If none, show last few
  if (!showVoyages.length) {
    schedule.voyages.slice(-3).forEach(v => {
      if (!seen.has(v.voyage_no)) showVoyages.push(v);
    });
  }

  if (showVoyages.length > 1) {
    const tabsDiv = h('div', {
      className: 'voy-tabs',
      style: { overflowX: 'auto', flexWrap: 'nowrap' }
    });
    showVoyages.forEach((v, i) => {
      const isCur = schedule.current &&
        v.voyage_no === schedule.current.voyage_no;
      const tabKey = v.voyage_no;
      const active = voyTab === tabKey ||
        (voyTab === 'cur' && isCur);
      tabsDiv.appendChild(
        h('div', {
          className: 'voy-tab'
            + (active ? ' active' : ''),
          style: { flex: '0 0 auto', minWidth: '80px',
            whiteSpace: 'nowrap', fontSize: '11px' },
          onClick: () => {
            state.voyTab[code] = tabKey;
            renderScheduleBody();
          }
        }, (isCur ? '현재 ' : '') + v.voyage_no)
      );
    });
    panel.appendChild(tabsDiv);
  } else if (showVoyages.length === 1) {
    panel.appendChild(
      h('div', {style:{
        fontSize:'12px',fontWeight:'700',
        color:'var(--primary)',marginBottom:'10px'
      }}, '항차 ' + showVoyages[0].voyage_no)
    );
  }

  // Port call header
  const portHeader = h('div', {style:{
    display:'flex',alignItems:'center',
    justifyContent:'space-between',marginBottom:'10px'
  }});
  portHeader.appendChild(
    h('span', {style:{fontSize:'11px',fontWeight:'700',
      color:'#7d8aa0'}}, '기항지')
  );
  portHeader.appendChild(
    h('div', {style:{
      display:'flex',gap:'14px',
      fontFamily:'Inter',fontSize:'10px',
      fontWeight:'700',color:'#b3bccb'
    }}, [
      h('span', {style:{width:'82px',
        textAlign:'right'}}, 'ETA'),
      h('span', {style:{width:'82px',
        textAlign:'right'}}, 'ETD')
    ])
  );
  panel.appendChild(portHeader);

  // Find selected voyage
  // If date filter active, auto-select matching voyage
  let voyage = null;
  if (state.dateFrom || state.dateTo) {
    const fromT = state.dateFrom
      ? new Date(state.dateFrom + 'T00:00:00') : null;
    const toT = state.dateTo
      ? new Date(state.dateTo + 'T23:59:59') : null;
    voyage = showVoyages.find(v => {
      return v.calls && v.calls.some(c => {
        const eta = parseDate(c.eta);
        if (!eta) return false;
        if (fromT && eta < fromT) return false;
        if (toT && eta > toT) return false;
        return true;
      });
    });
  }
  if (!voyage) {
    if (voyTab === 'cur') {
      voyage = schedule.current || showVoyages[0];
    } else {
      voyage = showVoyages.find(
        v => v.voyage_no === voyTab
      );
    }
    // Fallback: current voyage or first shown
    if (!voyage) {
      voyage = schedule.current || showVoyages[0];
    }
  }
  if (voyage && voyage.calls) {
    const now = new Date();
    voyage.calls.forEach((call, i) => {
      const eta = parseDate(call.eta);
      const etd = parseDate(call.etd);
      const isSkip = call.skip;
      const isPast = eta && eta <= now
        && call.departure_status === 'A';
      // Berthed = arrived but not departed yet
      const isBerthed = eta && eta <= now
        && call.arrival_status === 'A'
        && call.departure_status !== 'A';
      // Only mark "next" in the CURRENT voyage (not future voyages)
      const isCurrentVoyage = schedule.current &&
        voyage.voyage_no === schedule.current.voyage_no;
      // Next port = first future port, only in current voyage
      let isNext = false;
      if (isCurrentVoyage && !isPast && !isBerthed
          && eta && eta > now) {
        // Check no earlier port in this voyage is also future
        const earlierFuture = voyage.calls.slice(0, i)
          .some(c => {
            const ce = parseDate(c.eta);
            return ce && ce > now && c.departure_status !== 'A';
          });
        if (!earlierFuture) isNext = true;
      }
      const isCurrent = isBerthed || isNext;

      const portCall = h('div', {
        className: 'port-call',
        style: isBerthed ? {
          background: '#e8f5e9',
          borderRadius: '8px',
          padding: '8px 6px 8px 0',
          margin: '0 -6px 6px -6px'
        } : {}
      });

      // Dot
      let dotBg, dotBorder;
      if (isSkip) {
        dotBg = '#c0392b';
        dotBorder = '#c0392b';
      } else if (isBerthed) {
        dotBg = '#e8f5e9';
        dotBorder = '#2e7d32';
      } else if (isCurrent) {
        dotBg = '#2e7d32';
        dotBorder = '#2e7d32';
      } else if (isPast) {
        dotBg = '#c3ccda';
        dotBorder = '#c3ccda';
      } else {
        dotBg = '#fff';
        dotBorder = '#c3ccda';
      }
      portCall.appendChild(
        h('div', {className: 'port-dot',
          style: {
            background: dotBg,
            border: '2px solid ' + dotBorder
          }
        })
      );

      // Info
      const info = h('div', {className: 'port-info'});
      let label = portShort(call.port_name);
      if (call.terminal) {
        // Show only terminal code (first word), not full name
        const tCode = call.terminal.split(' ')[0];
        if (tCode) label += ' (' + tCode + ')';
      }
      info.appendChild(
        h('span', {className: 'port-name',
          style: {
            fontWeight: (isCurrent || isBerthed) ? '800' : '500',
            color: isSkip ? '#c0392b'
              : isBerthed ? '#2e7d32'
              : isCurrent ? '#2e7d32'
              : isPast ? '#a3adbd'
              : 'var(--ink2)',
            textDecoration: isSkip
              ? 'line-through' : 'none'
          }
        }, label)
      );
      const times = h('div', {className: 'port-times'});
      times.appendChild(
        h('span', {className: 'port-time'},
          eta ? fmtShort(eta) : '-')
      );
      times.appendChild(
        h('span', {className: 'port-time',
          style: { color: '#a3adbd' }},
          etd ? fmtShort(etd) : '-')
      );
      info.appendChild(times);
      portCall.appendChild(info);
      panel.appendChild(portCall);
    });
  } else {
    panel.appendChild(
      h('div', {style:{
        fontSize:'13px',color:'var(--muted)',
        textAlign:'center',padding:'20px 0'
      }}, '스케줄 데이터가 없습니다.')
    );
  }

  return panel;
}

async function toggleShipFav(code) {
  const favs = state.favorites.ship;
  const idx = favs.indexOf(code);
  if (idx >= 0) {
    const ok = await showConfirm(
      code + ' 선박을 즐겨찾기에서 해제하시겠습니까?'
    );
    if (!ok) return;
    favs.splice(idx, 1);
  } else {
    favs.push(code);
    showToast(code + ' 즐겨찾기 추가');
  }
  state.favorites.ship = [...favs];
  if (state.user) {
    saveFavorites(
      state.user.email, 'ship', state.favorites.ship
    );
  }
  render();
}

    display:'flex',alignItems:'center',
    justifyContent:'space-between'
  }});
  titleRow.appendChild(
    h('div', {style:{fontSize:'19px',fontWeight:'700'}},
      '\u{1F527} 도크 입거')

    display:'flex',background:'rgba(255,255,255,.14)',
    borderRadius:'9px',padding:'3px'
  }});
  ['list', 'calendar'].forEach(v => {
    const active = state.dockView === v;
    viewToggle.appendChild(
      h('span', {style:{
        fontSize:'12px',fontWeight:'600',
        padding:'5px 11px',borderRadius:'7px',
        cursor:'pointer',

          ? 'rgba(255,255,255,.9)' : 'transparent'

        state.dockView = v; render();
      }}, v === 'list' ? '리스트' : '캘린더')
    );
  });
  titleRow.appendChild(viewToggle);
  header.appendChild(titleRow);

  // Stats
  const currentCount = state.docks.filter(
    d => isDockCurrent(d)).length;
  const upcomingCount = state.docks.filter(
    d => isDockUpcoming(d)).length;
  header.appendChild(
    h('div', {style:{marginTop:'4px',fontSize:'11.5px',
      color:'#a9c8ee'}},
      `진행중 ${currentCount}척 \xB7 `
      + `예정 ${upcomingCount}건`)
  );

  // Search
  const searchBox = h('div', {
    className: 'search-box',
    style: { marginTop: '12px' }
  });
  searchBox.appendChild(
    h('span', {style:{opacity:'0.8'}}, '\u{1F50D}')
  );
  const inp = h('input', {
    id: 'dock-search',
    placeholder: '선명 또는 코드 검색',
    value: state.dockQuery
  });
  inp.addEventListener('input', e => {
    state.dockQuery = e.target.value;
    render();
  });
  searchBox.appendChild(inp);
  if (state.dockQuery) {
    searchBox.appendChild(
      h('span', {className:'clear-x', onClick: () => {
        state.dockQuery = ''; render();
      }}, '\u2715')
    );
  }
  header.appendChild(searchBox);
  container.appendChild(header);

  // Body
  const body = h('div', {style:{padding:'16px'}});

  const dq = (state.dockQuery||'').trim().toUpperCase();

  if (dq) {
    // Search results
    const results = state.docks.filter(d => {
      const c = (d.code||'').toUpperCase();
      const n = (d.name||'').toUpperCase();
      return c.includes(dq) || n.includes(dq);
    });
    body.appendChild(
      h('div', {className:'section-label'},
        `검색 결과 ${results.length}건`)
    );
    results.forEach(d => {
      body.appendChild(renderDockItem(d));
    });
  } else if (state.dockView === 'list') {
    // Current
    const current = state.docks
      .filter(d => isDockCurrent(d));
    if (current.length) {
      body.appendChild(
        h('div', {className:'section-label',
          style:{color:'#c25d00',display:'flex',
            alignItems:'center',gap:'6px'}
        }, [
          h('span', {style:{width:'7px',height:'7px',
            borderRadius:'50%',background:'#ee7c1a',
            display:'inline-block'}}),
          '입거 진행중'
        ])
      );
      current.forEach(d => {
        body.appendChild(renderDockItem(d, 'current'));
      });
    }

    // Upcoming
    const upcoming = state.docks
      .filter(d => isDockUpcoming(d))
      .sort((a, b) =>
        new Date(a.start_date) - new Date(b.start_date)
      );
    body.appendChild(
      h('div', {className:'section-label',
        style:{marginTop: current.length ? '22px' : '0',
          display:'flex',alignItems:'center',gap:'6px'}
      }, [
        h('span', {style:{width:'7px',height:'7px',
          borderRadius:'50%',background:'#0064B4',
          display:'inline-block'}}),
        '입거 예정 (가까운 순)'
      ])
    );
    if (!upcoming.length) {
      body.appendChild(
        h('div', {style:{
          background:'var(--card)',borderRadius:'14px',
          border:'1px solid var(--cardbr)',

          fontSize:'13px',color:'var(--muted)'
        }}, '예정된 입거 일정이 없습니다.')
      );
    }
    upcoming.forEach(d => {
      body.appendChild(renderDockItem(d, 'upcoming'));
    });

    // Past
    const past = state.docks
      .filter(d => isDockPast(d))
      .sort((a, b) =>
        new Date(b.start_date) - new Date(a.start_date)
      );
    if (past.length) {
      body.appendChild(
        h('div', {className:'section-label',
          style:{marginTop:'22px'}},
          '\u{1F6E0} 완료된 입거')
      );
      past.forEach(d => {
        body.appendChild(renderDockItem(d, 'past'));
      });
    }
  } else {
    // Calendar view - group by year/month
    renderDockCalendar(body);
  }

  container.appendChild(body);
}

function isDockCurrent(d) {
  const now = new Date();
  const s = new Date(d.start_date);
  const e = new Date(d.end_date);
  return s <= now && e >= now;
}
function isDockUpcoming(d) {
  const now = new Date();
  return new Date(d.start_date) > now;
}
function isDockPast(d) {
  return new Date(d.end_date) < new Date();
}

function renderDockItem(d, phase) {
  if (!phase) {
    const now = new Date();
    const s = new Date(d.start_date);
    const e = new Date(d.end_date);
    phase = e < now ? 'past'
      : s <= now ? 'current' : 'upcoming';
  }
  const s = new Date(d.start_date);
  const e = new Date(d.end_date);
  const days = Math.ceil((e - s) / 86400000) + 1;
  const period = fmtFull(s).slice(0, 10) + ' ~ '
    + fmtFull(e).slice(0, 10);

  let badge, badgeColor, badgeBg;
  if (phase === 'current') {
    const rem = Math.max(0,
      Math.ceil((e - new Date()) / 86400000));
    badge = '진행중';
    badgeColor = '#c25d00'; badgeBg = '#fff3e0';
  } else if (phase === 'upcoming') {
    const dd = Math.max(0,
      Math.ceil((s - new Date()) / 86400000));
    badge = 'D-' + dd;
    badgeColor = dd <= 14 ? '#c25d00' : '#0064B4';
    badgeBg = dd <= 14 ? '#fff3e0' : '#e8f1fb';
  } else {
    badge = '완료';
    badgeColor = '#5b6a82'; badgeBg = '#eef1f6';
  }

  return h('div', {
    className: 'dock-card'
      + (phase === 'current' ? ' current' : '')
  }, [
    h('div', {style:{minWidth:'0'}}, [
      h('div', {style:{
        display:'flex',alignItems:'baseline',gap:'8px'
      }}, [
        h('span', {style:{fontFamily:'Inter',
          fontWeight:'800',fontSize:'15px',
          color:'var(--ink)'}}, d.code),
        h('span', {style:{fontSize:'12px',
          color:'var(--ink2)',fontWeight:'600',
          fontFamily:'Inter'}}, period)
      ]),
      h('div', {style:{marginTop:'2px',fontSize:'11px',
        color:'var(--ink3)'}},
        '\u{1F4CD} ' + (d.yard||'') + ' \xB7 '
        + (d.port||''))
    ]),
    h('span', {style:{
      flex:'0 0 auto',fontFamily:'Inter',
      fontSize: phase === 'upcoming' ? '13px' : '11px',
      fontWeight: phase === 'upcoming' ? '800' : '700',
      color: badgeColor, background: badgeBg,
      padding:'5px 11px',borderRadius:'20px'
    }}, badge)
  ]);
}

function renderDockCalendar(body) {
  // Group docks by year and month
  const groups = {};
  state.docks.forEach(d => {
    if (isDockPast(d)) return;
    const s = new Date(d.start_date);
    const ym = s.getFullYear() + '-'
      + String(s.getMonth() + 1).padStart(2, '0');
    if (!groups[ym]) {
      groups[ym] = {
        year: s.getFullYear(),
        month: s.getMonth() + 1,
        items: []
      };
    }
    groups[ym].items.push(d);
  });

  const sorted = Object.values(groups).sort((a, b) =>
    (a.year - b.year) || (a.month - b.month)
  );

  // Group by year
  const yearMap = {};
  sorted.forEach(g => {
    (yearMap[g.year] = yearMap[g.year] || []).push(g);
  });

  Object.entries(yearMap)
    .sort((a, b) => a[0] - b[0])
    .forEach(([yr, months]) => {
      const total = months.reduce(
        (s, m) => s + m.items.length, 0
      );
      const yearEl = h('div', {
        style: { marginBottom: '14px' }
      });

      // Year header
      yearEl.appendChild(
        h('div', {style:{
          display:'flex',alignItems:'center',
          justifyContent:'space-between',
          background:'var(--gradient)',
          borderRadius:'12px',padding:'11px 16px',
          cursor:'pointer',color:'#fff'
        }, onClick: () => {
          state.dockExpanded['y' + yr] =
            !state.dockExpanded['y' + yr];
          render();
        }}, [
          h('span', {style:{
            fontSize:'15px',fontWeight:'800',
            letterSpacing:'0.3px'
          }}, '\u{1F4C5} ' + yr + '년'),
          h('span', {style:{
            fontSize:'11.5px',fontWeight:'600',
            color:'#a9c8ee'
          }}, total + '건')
        ])
      );

      if (state.dockExpanded['y' + yr] !== true
          && yr == new Date().getFullYear()) {
        // Default open for current year
      } else if (state.dockExpanded['y' + yr] === true
          || !state.dockExpanded.hasOwnProperty('y'+yr)){
        // Show months
      } else {
        body.appendChild(yearEl);
        return;
      }

      months.forEach(mg => {
        const monthCard = h('div', {style:{
          background:'var(--card)',borderRadius:'14px',
          border:'1px solid var(--cardbr)',
          boxShadow:'0 2px 8px rgba(20,40,80,.05)',
          overflow:'hidden',marginTop:'10px'
        }});
        monthCard.appendChild(
          h('div', {style:{
            display:'flex',alignItems:'center',
            justifyContent:'space-between',
            padding:'8px 14px',
            borderBottom:'2px solid var(--cardbr)'
          }}, [
            h('span', {style:{fontSize:'13px',
              fontWeight:'800',color:'#0064B4'}},
              mg.month + '월'),
            h('span', {style:{fontSize:'10.5px',
              fontWeight:'600',color:'var(--muted)'}},
              mg.items.length + '건')
          ])
        );
        mg.items.forEach(d => {
          const s = new Date(d.start_date);
          const phase = isDockCurrent(d)
            ? 'current' : 'upcoming';
          const dd = Math.max(0,
            Math.ceil(
              (s - new Date()) / 86400000
            )
          );
          monthCard.appendChild(
            h('div', {style:{
              display:'flex',alignItems:'center',
              gap:'12px',padding:'10px 14px',
              borderBottom:'1px solid var(--divider)',
              cursor:'pointer'
            }}, [
              h('div', {style:{
                flex:'0 0 auto',width:'38px',
                textAlign:'center'
              }}, [
                h('div', {style:{
                  fontFamily:'Inter',fontWeight:'800',
                  fontSize:'16px',
                  color: phase === 'current'
                    ? '#ee7c1a' : '#0064B4',
                  lineHeight:'1'
                }}, s.getDate() + '일'),
              ]),
              h('div', {style:{
                width:'1px',alignSelf:'stretch',
                background:'var(--cardbr)'
              }}),
              h('div', {style:{
                flex:'1',minWidth:'0',display:'flex',
                alignItems:'baseline',gap:'8px'
              }}, [
                h('span', {style:{
                  fontFamily:'Inter',fontWeight:'800',
                  fontSize:'15px',color:'var(--ink)'
                }}, d.code),
                h('span', {style:{
                  fontSize:'11px',color:'var(--ink3)'
                }}, '\u{1F4CD} ' + (d.port||''))
              ]),
              h('span', {style:{
                flex:'0 0 auto',fontFamily:'Inter',
                fontSize:'12px',fontWeight:'800',
                color: phase === 'current'
                  ? '#c25d00' : '#0064B4',
                background: phase === 'current'
                  ? '#fff3e0' : '#e8f1fb',
                padding:'4px 10px',borderRadius:'18px'
              }}, phase === 'current'
                ? '진행중' : 'D-' + dd)
            ])
          );
        });
        yearEl.appendChild(monthCard);
      });
      body.appendChild(yearEl);
    });
}

  SHENZHEN:'션전',HAKATA:'하카타',OSAKA:'오사카',
  SINGAPORE:'싱가포르','PORT KLANG':'포트클랑',
  JAKARTA:'자카르타',HOCHIMINH:'호치민',
  HAIPHONG:'하이퐁',MANILA:'마닐라',
  CHENNAI:'첸나이','NHAVA SHEVA':'나바셰바',
  MUNDRA:'문드라',COLOMBO:'콜롬보',

};

function renderPortTab(container) {
  const header = h('div', {className: 'tab-header'});
  header.appendChild(
    h('div', {style:{fontSize:'19px',fontWeight:'700',
      marginBottom:'12px'}},
      '\u{1F50D} 항구 검색')
  );

  // Search — two fields: port + ship (side by side)
  const searchRow = h('div', {style:{
    display:'flex',gap:'6px',alignItems:'center'
  }});

  // Port search
  const portBox = h('div', {
    className: 'search-box',
    style: { height: '42px', flex: '1', padding: '0 8px' }
  });
  const portInp = h('input', {
    id: 'port-search',
    placeholder: '⚓ 항구명',
    value: state.portQuery,
    style: { fontSize: '13px' }
  });
  portInp.addEventListener('input', e => {
    state.portQuery = e.target.value;
    state.selectedPort = null;
    render();
  });
  portBox.appendChild(portInp);
  if (state.portQuery) {
    portBox.appendChild(
      h('span', {className:'clear-x', onClick: () => {
        state.portQuery = ''; render();
      }}, '\u2715')
    );
  }
  searchRow.appendChild(portBox);

  // Ship search
  const shipBox = h('div', {
    className: 'search-box',
    style: { height: '42px', flex: '1', padding: '0 8px' }
  });
  const shipInp = h('input', {
    id: 'port-ship-search',
    placeholder: '🚢 선명',
    value: state.portShipQuery,
    style: { fontSize: '13px' }
  });
  shipInp.addEventListener('input', e => {
    state.portShipQuery = e.target.value;
    render();
  });
  shipBox.appendChild(shipInp);
  if (state.portShipQuery) {
    shipBox.appendChild(
      h('span', {className:'clear-x', onClick: () => {
        state.portShipQuery = ''; render();
      }}, '\u2715')
    );
  }
  searchRow.appendChild(shipBox);
  header.appendChild(searchRow);

  // Combined search results
  if (state.portQuery && state.portShipQuery) {
    // Both filters → show matching port calls directly
    header.appendChild(
      h('div', {style:{
        marginTop:'8px',fontSize:'11px',
        color:'#a9c8ee',fontWeight:'600'
      }}, '🔍 ' + state.portShipQuery.toUpperCase()
        + ' → ' + state.portQuery.toUpperCase()
        + ' 검색 결과')
    );
  }

  // Region chips
  const chips = h('div', {style:{
    marginTop:'10px',display:'flex',gap:'7px',
    overflowX:'auto',paddingBottom:'2px'
  }});
  PORT_REGIONS.forEach(r => {
    const active = state.portRegion === r;
    chips.appendChild(
      h('span', {
        className: 'chip',
        style: {
          color: active ? '#fff' : '#cfe0f5',
          background: active
            ? 'rgba(255,255,255,.28)'
            : 'rgba(255,255,255,.08)',
          border: '1px solid '
            + (active ? 'rgba(255,255,255,.5)'
              : 'rgba(255,255,255,.15)')
        },
        onClick: () => {
          state.portRegion = r;
          state.selectedPort = null;
          render();
        }
      }, r)
    );
  });
  header.appendChild(chips);
  container.appendChild(header);

  // Body
  const body = h('div', {style:{padding:'16px'}});

  if (state.portQuery && state.portShipQuery) {
    // Combined search — show matching port calls directly
    renderCombinedSearch(body);
  } else if (state.selectedPort) {
    renderPortDetail(body);
  } else {
    renderPortList(body);
  }
  container.appendChild(body);
}

function renderCombinedSearch(body) {
  let pq = (state.portQuery || '').trim().toUpperCase();
  const sq = (state.portShipQuery || '').trim().toUpperCase();
  const rawPq = (state.portQuery || '').trim();

  // Resolve alias: BUS→BUSAN, 부산→BUSAN etc.
  const aliasResolved = SEARCH_ALIAS[pq] || SEARCH_ALIAS[rawPq];
  if (aliasResolved) pq = aliasResolved.toUpperCase();

  // Find matching port calls from all schedules
  const now = new Date();
  const results = [];

  Object.entries(state.schedules).forEach(([code, rows]) => {
    // Filter by ship query
    if (sq) {
      const ship = state.ships.find(s => s.code === code);
      const codeMatch = code.toUpperCase().includes(sq);
      const nameMatch = ship && (ship.name || '').toUpperCase().includes(sq);
      if (!codeMatch && !nameMatch) return;
    }

    rows.forEach(r => {
      // Filter by port query
      const pn = portShort(r.port_name || '').toUpperCase();
      const pc = (r.port_code || '').toUpperCase();
      // Also consolidate port_code
      const pcResolved = (PORT_CONSOLIDATE[pc] || '').toUpperCase();
      const kr = PORT_KR[pn] || '';
      const portMatch = pn.includes(pq) || pc.includes(pq)
        || pcResolved.includes(pq)
        || (rawPq && kr.includes(rawPq));
      if (!portMatch) return;

      // Only future calls
      const eta = parseDate(r.eta);
      if (eta && eta >= now) {
        results.push({ ...r, vessel_code: code });
      }
    });
  });

  results.sort((a, b) => new Date(a.eta) - new Date(b.eta));

  body.appendChild(
    h('div', {className: 'section-label'},
      sq + ' → ' + pq + ' 스케줄 (' + results.length + '건)')
  );

  if (!results.length) {
    body.appendChild(
      h('div', {style:{
        background:'var(--card)',borderRadius:'14px',
        border:'1px solid var(--cardbr)',
        padding:'22px',textAlign:'center',
        fontSize:'13px',color:'var(--muted)'
      }}, '해당 조건의 스케줄이 없습니다.')
    );
    return;
  }

  results.slice(0, 30).forEach(c => {
    const eta = parseDate(c.eta);
    const etd = parseDate(c.etd);
    const ship = state.ships.find(s => s.code === c.vessel_code);
    const tCode = c.terminal ? c.terminal.split(' ')[0] : '';

    body.appendChild(
      h('div', {style:{
        background:'var(--card)',borderRadius:'14px',
        border:'1px solid var(--cardbr)',
        boxShadow:'0 2px 8px rgba(20,40,80,.05)',
        padding:'10px 14px',display:'flex',
        alignItems:'center',
        justifyContent:'space-between',gap:'10px',
        marginBottom:'10px'
      }}, [
        h('div', {style:{minWidth:'0'}}, [
          h('div', {style:{display:'flex',
            alignItems:'baseline',gap:'7px',
            flexWrap:'wrap'}}, [
            h('span', {style:{fontFamily:'Inter',
              fontWeight:'800',fontSize:'15px',
              color:'var(--ink)'}}, c.vessel_code),
            h('span', {style:{fontSize:'11px',
              color:'var(--ink3)'}},
              portShort(c.port_name)),
            tCode ? h('span', {style:{
              fontSize:'10px',fontFamily:'Inter',
              fontWeight:'700',color:'#0064B4',
              background:'#e8f1fb',
              padding:'1px 6px',borderRadius:'6px'
            }}, tCode) : null
          ]),
          h('div', {style:{marginTop:'2px',
            fontSize:'11px',color:'var(--ink3)'}},
            '항차 ' + (c.voyage_no || '-')
            + (ship ? ' · ' + (ship.name || '') : ''))
        ]),
        h('div', {style:{flex:'0 0 auto',
          textAlign:'right',fontFamily:'Inter'}}, [
          h('div', {style:{fontSize:'11.5px',
            color:'#2e7d32',fontWeight:'700'}},
            'ETA ' + (eta ? fmtShort(eta) : '-')),
          h('div', {style:{fontSize:'11.5px',
            color:'#c25d00',fontWeight:'700',
            marginTop:'1px'}},
            'ETD ' + (etd ? fmtShort(etd) : '-'))
        ])
      ])
    );
  });

  if (results.length > 30) {
    body.appendChild(
      h('div', {style:{
        textAlign:'center',fontSize:'12px',
        color:'var(--muted)',padding:'10px'
      }}, '외 ' + (results.length - 30) + '건 더...')
    );
  }
}

function renderPortList(body) {
  const pq = (state.portQuery||'').trim().toUpperCase();
  const rawq = (state.portQuery||'').trim();

  // Recent ports
  if (!pq && state.recentPorts.length) {
    body.appendChild(
      h('div', {className:'section-label'},
        '\u{1F558} 최근 조회')
    );
    const row = h('div', {style:{
      display:'flex',gap:'8px',overflowX:'auto',
      marginBottom:'18px'
    }});
    state.recentPorts.forEach(name => {
      const chip = h('div', {style:{
        flex:'0 0 auto',display:'flex',
        alignItems:'center',gap:'7px',
        background:'var(--card)',
        border:'1px solid var(--cardbr)',
        borderRadius:'20px',padding:'8px 12px'
      }}, [
        h('span', {style:{
          fontSize:'13px',fontWeight:'600',
          color:'var(--ink)',cursor:'pointer'
        }, onClick: () => {
          state.selectedPort = name; render();
        }}, name),
        h('span', {style:{
          fontSize:'13px',color:'#b3bccb',
          cursor:'pointer'
        }, onClick: (e) => {
          e.stopPropagation();
          state.recentPorts =
            state.recentPorts.filter(x => x !== name);
          try {
            localStorage.setItem('kmtc_recent',
              JSON.stringify(state.recentPorts));
          } catch(e) {}
          render();
        }}, '\u2715')
      ]);
      row.appendChild(chip);
    });
    body.appendChild(row);
  }

  // Favorites
  const favPorts = state.favorites.port;
  if (!pq && favPorts.length) {
    body.appendChild(
      h('div', {className:'section-label'},
        '\u2B50 즐겨찾는 항구')
    );
    const wrap = h('div', {style:{
      display:'flex',flexWrap:'wrap',gap:'8px',
      marginBottom:'20px'
    }});
    favPorts.forEach(name => {
      wrap.appendChild(
        h('div', {style:{
          display:'flex',alignItems:'center',gap:'6px',
          background:'var(--card)',
          border:'1px solid #e2e8f0',
          borderRadius:'22px',padding:'9px 12px',
          boxShadow:'0 1px 4px rgba(20,40,80,.05)'
        }}, [
          h('span', {style:{
            color:'#f6a623',cursor:'pointer'
          }, onClick: () => togglePortFav(name)},
            '\u2605'),
          h('span', {style:{
            fontSize:'13px',fontWeight:'700',
            color:'var(--ink)',cursor:'pointer'
          }, onClick: () => {
            state.selectedPort = name;
            addRecentPort(name);
            render();
          }}, name)
        ])
      );
    });
    body.appendChild(wrap);
  }

  // Port groups
  let ports = PORTS_DB;
  if (pq) {
    ports = PORTS_DB.filter(p => {
      if (p.name.includes(pq)) return true;
      if (p.code.includes(pq)) return true;
      const kr = PORT_KR[p.name];
      if (kr && rawq && kr.includes(rawq)) return true;
      if (p.terminals &&
          p.terminals.some(t => t.includes(pq))) {
        return true;
      }
      return false;
    });
  } else if (state.portRegion !== '전체') {
    ports = PORTS_DB.filter(
      p => p.region === state.portRegion
    );
  }

  // Group by region
  const groups = {};
  ports.forEach(p => {
    (groups[p.region] = groups[p.region] || []).push(p);
  });

  const label = pq
    ? `검색 결과 ${ports.length}곳`
    : (state.portRegion === '전체'
      ? '전체 항구' : state.portRegion);
  body.appendChild(
    h('div', {className:'section-label'}, label)
  );

  const regionOrder = pq
    ? Object.keys(groups)
    : ['한국','중국','동남아','인도','중동','일본']
      .filter(r => groups[r]);

  regionOrder.forEach(region => {
    const ps = groups[region] || [];
    if (!ps.length) return;
    const isOpen = pq
      || state.portRegion !== '전체'
      || state.openRegions[region];

    const groupEl = h('div', {style:{
      background:'var(--card)',borderRadius:'14px',
      border:'1px solid var(--cardbr)',
      overflow:'hidden',
      boxShadow:'0 2px 8px rgba(20,40,80,.05)',
      marginBottom:'10px'
    }});

    // Group header
    groupEl.appendChild(
      h('div', {style:{
        display:'flex',alignItems:'center',
        justifyContent:'space-between',
        padding:'13px 15px',cursor:'pointer'
      }, onClick: () => {
        state.openRegions[region] =
          !state.openRegions[region];
        render();
      }}, [
        h('div', {style:{display:'flex',
          alignItems:'center',gap:'9px'}}, [
          h('span', {style:{fontSize:'16px'}},
            ps[0].flag),
          h('span', {style:{fontSize:'14px',
            fontWeight:'700',color:'var(--ink)'}},
            region),
          h('span', {style:{fontSize:'11px',
            color:'var(--muted)'}}, ps.length + '곳')
        ]),
        h('span', {style:{color:'#9aa5b6',
          fontSize:'13px'}},
          isOpen ? '\u25B2' : '\u25BC')
      ])
    );

    if (isOpen) {
      const list = h('div', {style:{
        borderTop:'1px solid var(--divider)'
      }});
      ps.forEach(p => {
        const isFav = favPorts.includes(p.name);
        list.appendChild(
          h('div', {style:{
            display:'flex',alignItems:'center',
            justifyContent:'space-between',
            padding:'12px 15px',
            borderBottom:'1px solid var(--divider)'
          }}, [
            h('div', {style:{
              display:'flex',alignItems:'center',
              gap:'10px',cursor:'pointer',flex:'1'
            }, onClick: () => {
              state.selectedPort = p.name;
              addRecentPort(p.name);
              render();
            }}, [
              h('span', {style:{fontSize:'14px'}},
                '\u2693'),
              h('span', {style:{fontSize:'14px',
                fontWeight:'600',color:'var(--ink)'}},
                p.name)
            ]),
            h('span', {style:{
              cursor:'pointer',fontSize:'16px',
              color: isFav ? '#f6a623' : '#c3ccda'
            }, onClick: () => togglePortFav(p.name)},
              isFav ? '\u2605' : '\u2606')
          ])
        );
      });
      groupEl.appendChild(list);
    }
    body.appendChild(groupEl);
  });
}

function renderPortDetail(body) {
  const name = state.selectedPort;
  const portInfo = PORTS_DB.find(
    p => p.name === name
  ) || { name, code: '', region: '' };
  const isFav = state.favorites.port.includes(name);

  // Back button
  body.appendChild(
    h('div', {style:{
      display:'inline-flex',alignItems:'center',
      gap:'5px',fontSize:'13px',color:'#0064B4',
      fontWeight:'600',cursor:'pointer',
      marginBottom:'12px'
    }, onClick: () => {
      state.selectedPort = null; render();
    }}, '\u2039 항구 목록')
  );

  // Port header card
  const hdr = h('div', {style:{
    background:'var(--gradient)',borderRadius:'16px',
    padding:'16px 18px',color:'#fff',
    marginBottom:'14px'
  }});
  hdr.appendChild(
    h('div', {style:{
      display:'flex',alignItems:'center',gap:'8px'
    }}, [
      h('span', {style:{fontSize:'20px',
        fontWeight:'800'}}, name),
      h('span', {style:{fontFamily:'Inter',
        fontSize:'12px',color:'#a9c8ee'}},
        portInfo.region),
      h('span', {style:{cursor:'pointer',
        fontSize:'18px',
        color: isFav ? '#f6a623' : 'rgba(255,255,255,.5)'
      }, onClick: () => togglePortFav(name)},
        isFav ? '\u2605' : '\u2606')
    ])
  );
  if (portInfo.terminals && portInfo.terminals.length) {
    const tRow = h('div', {style:{
      marginTop:'12px',display:'flex',
      flexWrap:'wrap',gap:'6px'
    }});
    portInfo.terminals.forEach(t => {
      tRow.appendChild(
        h('span', {style:{
          fontSize:'10.5px',fontFamily:'Inter',
          color:'#d9e6f7',
          background:'rgba(255,255,255,.14)',
          borderRadius:'6px',padding:'3px 7px'
        }}, t)
      );
    });
    hdr.appendChild(tRow);
  }
  body.appendChild(hdr);

  // Find ships calling this port from schedules
  body.appendChild(
    h('div', {className:'section-label'},
      '입출항 스케줄')
  );

  const portName = name.toUpperCase();
  const calls = [];
  Object.entries(state.schedules).forEach(
    ([code, rows]) => {
      rows.forEach(r => {
        const pn = portShort(
          r.port_name || ''
        ).toUpperCase();
        if (pn === portName || pn.includes(portName)) {
          calls.push({ ...r, vessel_code: code });
        }
      });
    }
  );
  // Sort by ETA, show upcoming
  const now = new Date();
  const upcoming = calls
    .filter(c => parseDate(c.eta) >= now)
    .sort((a, b) =>
      new Date(a.eta) - new Date(b.eta)
    )
    .slice(0, 20);

  if (!upcoming.length) {
    body.appendChild(
      h('div', {style:{
        background:'var(--card)',borderRadius:'14px',
        border:'1px solid var(--cardbr)',
        padding:'22px',textAlign:'center',
        fontSize:'13px',color:'var(--muted)'
      }}, '예정된 입출항 스케줄이 없습니다.')
    );
  } else {
    upcoming.forEach(c => {
      const eta = parseDate(c.eta);
      const etd = parseDate(c.etd);
      const ship = state.ships.find(
        s => s.code === c.vessel_code
      );
      const isMine = state.favorites.ship.includes(
        c.vessel_code
      );
      body.appendChild(
        h('div', {style:{
          background:'var(--card)',borderRadius:'14px',
          border:'1px solid var(--cardbr)',
          boxShadow:'0 2px 8px rgba(20,40,80,.05)',
          padding:'10px 14px',display:'flex',
          alignItems:'center',
          justifyContent:'space-between',gap:'10px',
          marginBottom:'10px'
        }}, [
          h('div', {style:{minWidth:'0'}}, [
            h('div', {style:{display:'flex',
              alignItems:'baseline',gap:'7px',
              flexWrap:'wrap'}}, [
              h('span', {style:{fontFamily:'Inter',
                fontWeight:'800',fontSize:'15px',
                color:'var(--ink)'}},
                c.vessel_code),
              isMine ? h('span', {style:{
                fontSize:'10px',fontWeight:'700',
                color:'#f6a623'}}, '\u2605') : null,
              c.terminal ? h('span', {style:{
                fontSize:'10px',fontFamily:'Inter',
                fontWeight:'700',color:'#0064B4',
                background:'#e8f1fb',
                padding:'1px 6px',borderRadius:'6px'
              }}, c.terminal) : null
            ]),
            h('div', {style:{marginTop:'2px',
              fontSize:'11px',color:'var(--ink3)'}},
              '항차 ' + (c.voyage_no || '-')
              + (ship ? ' \xB7 '
                + (ship.route_key || '') : ''))
          ]),
          h('div', {style:{flex:'0 0 auto',
            textAlign:'right',fontFamily:'Inter'}}, [
            h('div', {style:{fontSize:'11.5px',
              color:'#2e7d32',fontWeight:'700'}},
              'ETA ' + (eta ? fmtShort(eta) : '-')),
            h('div', {style:{fontSize:'11.5px',
              color:'#c25d00',fontWeight:'700',
              marginTop:'1px'}},
              'ETD ' + (etd ? fmtShort(etd) : '-'))
          ])
        ])
      );
    });
  }
}

async function togglePortFav(name) {
  const favs = state.favorites.port;
  const idx = favs.indexOf(name);
  if (idx >= 0) {
    const ok = await showConfirm(
      name + ' 항구를 즐겨찾기에서 해제하시겠습니까?'
    );
    if (!ok) return;
    favs.splice(idx, 1);
  } else {
    favs.push(name);
    showToast(name + ' 즐겨찾기 추가');
  }
  state.favorites.port = [...favs];
  if (state.user) {
    saveFavorites(
      state.user.email, 'port', state.favorites.port
    );
  }
  render();
}

function addRecentPort(name) {
  state.recentPorts = [
    name,
    ...state.recentPorts.filter(x => x !== name)
  ].slice(0, 5);
  try {
    localStorage.setItem(
      'kmtc_recent',
      JSON.stringify(state.recentPorts)
    );
  } catch(e) {}
}

      style: {
        transform:
          'translateX(' + (state.dark?'22px':'0') + ')'
      }
    })
  );
  darkRow.appendChild(toggle);
  profile.appendChild(darkRow);

  // Logout
  profile.appendChild(
    h('button', {className:'logout-btn',
      onClick: async () => {
        const ok = await showConfirm(
          '로그아웃 하시겠습니까?'

    }, '\u23FB 로그아웃')

    );
  }
  const tabRow = h('div', {style:{

  }});
  subTabs.forEach(t => {

        fontWeight:'700',padding:'9px 0',
        borderRadius:'10px',cursor:'pointer',

          ? 'var(--primary)' : 'var(--card)',
        border: '1px solid '
          + (active ? 'var(--primary)' : 'var(--cardbr)')
      }, onClick: () => {
        state.settingsTab = t.id;
        state.favSearch = '';

      }}, t.label)

  // Sub-tab content
  switch (state.settingsTab) {
    case 'myships':
      renderMyShipsSettings(body); break;

      if (isAdmin) renderShipManagement(body); break;

    const fleetRow = h('div', {style:{

          state.settingsFleet = f; render();
        }}, f)
      );
    });

    // Ship list
    const fq = (state.favSearch||'').trim().toUpperCase();
    let ships = state.ships.filter(s => {
      const isSunny = (s.code||'').startsWith('S');
      if (state.settingsFleet === 'SUNNY'
          && !isSunny) return false;
      if (state.settingsFleet === 'KMTC'
          && isSunny) return false;
      if (fq) {
        const code = (s.code||'').toUpperCase();
        const name = (s.name||'').toUpperCase();
        if (!code.includes(fq) && !name.includes(fq)) {
          return false;
        }
      }
      return true;
    });

    const list = h('div', {style:{
      background:'var(--card)',borderRadius:'14px',
      border:'1px solid var(--cardbr)',
      overflow:'hidden',
      boxShadow:'0 2px 8px rgba(20,40,80,.05)',

        s.code

          justifyContent:'space-between',
          padding:'10px 14px',

            h('span', {style:{fontSize:'11px',

            isFav ? '\u2605' : '\u2606')
        ])
      );
    });

  } else {
    // Port favorites
    const fq = (state.favSearch||'').trim().toUpperCase();
    const regions = ['한국','중국','동남아','인도',
      '중동','일본'];
    regions.forEach(region => {
      const ps = PORTS_DB.filter(p => {
        if (p.region !== region) return false;
        if (fq && !p.name.includes(fq)
            && !(PORT_KR[p.name]||'').includes(
              state.favSearch)) {
          return false;
        }
        return true;
      });
      if (!ps.length) return;

      const isOpen = state.openRegions['s_'+region];
      const groupEl = h('div', {style:{
        background:'var(--card)',borderRadius:'14px',
        border:'1px solid var(--cardbr)',

        boxShadow:'0 2px 8px rgba(20,40,80,.05)',
        marginBottom:'10px'

      groupEl.appendChild(
        h('div', {style:{
          display:'flex',alignItems:'center',
          justifyContent:'space-between',
          padding:'12px 14px',cursor:'pointer'

          state.openRegions['s_'+region] =
            !state.openRegions['s_'+region];
          render();
        }}, [
          h('div', {style:{display:'flex',
            alignItems:'center',gap:'8px'}}, [
            h('span', {style:{fontSize:'14px',
              fontWeight:'700',color:'var(--ink)'}},
              region),
            h('span', {style:{fontSize:'11px',
              color:'var(--muted)'}}, ps.length + '곳')
          ]),
          h('span', {style:{color:'#9aa5b6',
            fontSize:'12px'}},
            isOpen ? '\u25B2' : '\u25BE')
        ])
      );
      if (isOpen) {
        const listEl = h('div', {style:{
          borderTop:'1px solid var(--divider)'
        }});
        ps.forEach(p => {
          const isFav = state.favorites.port.includes(
            p.name
          );
          listEl.appendChild(
            h('div', {style:{
              display:'flex',alignItems:'center',
              justifyContent:'space-between',
              padding:'10px 14px',
              borderBottom:
                '1px solid var(--divider)'
            }}, [
              h('div', {style:{display:'flex',
                alignItems:'center',gap:'8px',
                minWidth:'0'}}, [
                h('span', {style:{fontSize:'13px'}},
                  '\u2693'),
                h('span', {style:{fontSize:'14px',
                  fontWeight:'600',color:'var(--ink)'}},
                  p.name)
              ]),
              h('span', {style:{
                flex:'0 0 auto',cursor:'pointer',
                fontSize:'18px',padding:'0 4px',
                color: isFav ? '#f6a623' : '#c3ccda'
              }, onClick: () => togglePortFav(p.name)},
                isFav ? '\u2605' : '\u2606')
            ])
          );
        });
        groupEl.appendChild(listEl);
      }
      body.appendChild(groupEl);
    });
  }
}
